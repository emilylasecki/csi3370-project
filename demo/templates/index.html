<!DOCTYPE html>
<html lang="en">
    <link rel="stylesheet" href="/static/css/MainPageCSS.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Wins</title>
</head>
<body>

    <div id="list-container"> 

        <div id="createdTask" style="display:none; background:#d4edda; padding:10px;">
        Task created successfully!
        </div>

        <div id="createdGroup" style="display:none; background:#d4edda; padding:10px;">
        Group created successfully!
        </div>

        <script>
        const params = new URLSearchParams(window.location.search);

        if (params.get("success") === "1") {
            document.getElementById("createdTask").style.display = "block";
        }

        if (params.get("success") === "2") {
            document.getElementById("createdGroup").style.display = "block";
        }
        </script>

        <form action="/logout" method="get">
    <button type="submit">Logout</button>
        </form>


        <div id="header">
            <h1>Your Wins</h1>

            <div id="actions">
                <span id="spaceSpan">Filter</span>
                <span>Sort <button>&#8595</button></span>
            </div>
        </div>

        <div id="tasks">
            <img src="/static/images/CheckSquare.png" id="icon">
            <dl>
                <dt>Task</dt>
                <dd>Task Description</dd>
            </dl>
        </div>

        <hr>
        
        <div id="habits">
            <img src="/static/images/Award.png" id="image">
            <dl>
                <dt>Habit</dt>
                <dd>Habit Description</dd>
            </dl>
        </div>

        <a href="/taskcreation">
            <button>Add</button> 
        </a>

    </div>

<a href="/wrapped" id="wrapped">
    <img src="/static/images/gift.png" id="wrapIcon" alt="Wrap gift">

    {% if wrap_ready %}
        <p>Wrap ready!</p>
    {% else %}
        <p>Collecting wins...</p>
    {% endif %}
</a>

</body>
</html>
