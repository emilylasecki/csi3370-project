<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Modify Groups</title>
    <link rel="stylesheet" href="/static/css/MainPageCSS.css">
</head>

<body>

<div id="selectors">

<!-- GROUP SELECT -->
<form method="get" action="/modifygroup">
<div class="box">

<select name="groupID" onchange="this.form.submit()">

<option value="0">Select Group</option>

{% for group in groups %}
<option value="{{ group.groupID }}"
{% if selected_group and group.groupID == selected_group.groupID %}
selected
{% endif %}
>
{{ group.groupName }}
</option>
{% endfor %}

</select>

</div>
</form>


{% if selected_group %}

<!-- GROUP INFO -->
<div class="box">

<p><strong>Name:</strong> {{ selected_group.groupName }}</p>
<p><strong>Color:</strong> {{ selected_group.color }}</p>
<p><strong>Habit:</strong> {{ selected_group.is_habit }}</p>

</div>


<!-- UPDATE GROUP -->
<form method="post" action="/update_group">

<input type="hidden" name="groupID" value="{{ selected_group.groupID }}">

<div class="box">
<label>Title</label>
<input type="text" name="title" value="{{ selected_group.groupName }}">
</div>

<div class="box">
<label>Color</label>
<select name="color">

<option value="Red" {% if selected_group.color=="Red" %}selected{% endif %}>Red</option>
<option value="Orange" {% if selected_group.color=="Orange" %}selected{% endif %}>Orange</option>
<option value="Yellow" {% if selected_group.color=="Yellow" %}selected{% endif %}>Yellow</option>
<option value="Green" {% if selected_group.color=="Green" %}selected{% endif %}>Green</option>

</select>
</div>

<div class="box">
<label>Habit</label>
<input type="checkbox" name="habit"
{% if selected_group.is_habit %}checked{% endif %}>
</div>

<button type="submit">Update Group</button>

</form>


<!-- DELETE GROUP -->
<form method="post" action="/delete_group">

<input type="hidden" name="groupID" value="{{ selected_group.groupID }}">

<button type="submit" style="background:red;color:white;">
Delete Group
</button>

</form>

{% endif %}

</div>

</body>
</html>
