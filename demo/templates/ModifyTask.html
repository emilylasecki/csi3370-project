<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Modify Task</title>
        <link rel="stylesheet" href="/static/css/ModifyTask.css">
    </head>

    <body>
        <div id="container">

            <form action="/" method="get">
                <button type="submit">Home</button>
            </form>

            <h1>Modify Task</h1>

            <form action="/modify_task" method="post">
                <input type="hidden" name="taskID" value="{{ task.task_id }}">
                
                <label for="taskName">Task Name:</label>
                <input type="text" id="taskname" name="taskName" value="{{ task.taskName }}"><br><br>

                <label for="desc">Description:</label>
                <textarea id="desc" name="description">{{ task.description }}</textarea><br><br>

                <label for="group">Group:</label>
                <select id="group" name="groupID">
                    <option value="">None</option>
                    {% for group in groups %}
                    <option value="{{ group.groupID }}" {% if task.groupID==group.groupID %}selected{% endif %}>
                        {{ group.groupName }}
                    </option>
                    {% endfor %}
                </select><br><br>

                <label for="due-date">Due Date:</label>
                <input type="date" name="dueDate" id="due-date" value="{{ task.dueDate }}"><br><br>

                <label for="status">Status:</label>
                <select name="status" id="status">
                    <option value="Not Started" {% if task.status=="Not Started" %}selected{% endif %}>Not Started</option>
                    <option value="In Progress" {% if task.status=="In Progress" %}selected{% endif %}>In Progress</option>
                    <option value="Complete" {% if task.status=="Complete" %}selected{% endif %}>Complete</option>
                </select><br><br>



                <div id="sliders">
                    <div class="label-sliders">
                        <label for="prioritySlider">Priority:</label>
                        <div class="slider-container">
                            <input type="range" name="priority" min="0" max="5" value="{{ task.priority }}" id="prioritySlider">
                            <span id="priorityValue">{{ task.priority }}</span>
                        </div>
                    </div>
    
                    <div class="label-sliders">
                        <label for="effortSlider">Effort:</label>
                        <div class="slider-container">
                            <input type="range" name="effortEstimation" min="0" max="5" value="{{ task.effortEstimation }}" id="effortSlider">
                            <span id="effortValue">{{ task.effortEstimation }}</span>
                        </div>
                    </div>

                </div>
                

                <button type="submit">Update Task</button>
            </form>

            <form action="/delete_task" method="post" style="margin-top:10px;">
                <input type="hidden" name="taskID" value="{{ task.task_id }}">
                <button type="submit" style="background:red; color:white;">Delete Task</button>
            </form>
        </div>


        <script>
            // Priority slider
            const prioritySlider = document.getElementById("prioritySlider");
            const priorityDisplay = document.getElementById("priorityValue");
            prioritySlider.addEventListener("input", () => {
                priorityDisplay.textContent = prioritySlider.value;
            });

            // Effort slider
            const effortSlider = document.getElementById("effortSlider");
            const effortDisplay = document.getElementById("effortValue");
            effortSlider.addEventListener("input", () => {
                effortDisplay.textContent = effortSlider.value;
            });
        </script>
        
    </body>
</html>
