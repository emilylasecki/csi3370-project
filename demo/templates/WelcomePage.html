<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/css/WelcomePage.css">

    
    <title>Welcome to LittleWins!</title>
</head>
<body>
    <h2>Welcome to LittleWins!</h2>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}
    
    <form action="/welcome" method="POST">

    <label for="username">Username:</label>
    <input id="username" name="Username" type="text" required>

    <label for="password">Password:</label>
    <input id="password" name="password" type="password" required>

    <button id="go-btn" type="submit">Go</button>
    </form>
    </form>
    <div id="sign up">
    <label for="register-btn">Don't have an account?</label>
    <a href="register"><button id="register-btn">Sign up</button></a>
    </div>
    <div id="reset">
    <label for="reset-btn">Forgot your password?</label>
    <a href="reset-password"><button id="reset-btn">Reset Password</button></a>
    </div>


</body>

</html>
