<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/css/NewPassword.css">
    <title>Password Change</title>
</head>
<body>

    <form action="/welcome" method="get">
    <button type="submit">Back to Login</button>
        </form>

    <h2>Reset Password</h2>



    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}
    <div>
    <form action="/reset-password" method="POST">
    <label for="new-username">Username:</label>
    <input id="new-username" name="Username" type="text" required>
    </div>
    <div>
    <label for="email">Email:</label>
    <input id="email" name="Email" type="email" required>
    </div>
    <div>
    <label for="Question">What city were you born in?</label>
    <input id="Question" name="Question" type="text" required>
    </div>
    <div>
    <label for="password">Create New Password:</label>
    <input id="password" name="new_password" type="password" required>
    </div>
    
    <a href="welcome"><button id="register-submit" type="submit">Update Password</button></a>
    
    </form>
</body>


</html>
